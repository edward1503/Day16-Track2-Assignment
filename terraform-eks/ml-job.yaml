apiVersion: batch/v1
kind: Job
metadata:
  name: ml-training-job
spec:
  template:
    spec:
      containers:
      - name: ml-container
        # Replace with your ECR repository URL after running terraform apply
        image: <YOUR_ECR_REPOSITORY_URL>:latest
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      restartPolicy: Never
  backoffLimit: 4
